<html>
<head>
    <title>Transactions</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>{{ name }}'s Transactions</h1>
    
    {% if transactions %}
    <table border="1">
        <tr>
            <th>Stock</th>
            <th>Ticker</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Type</th>
            <th>Date</th>
        </tr>
        {% for t in transactions %}
        <tr>
            <td>{{ t[0] }}</td>
            <td>{{ t[1] }}</td>
            <td>{{ t[2] }}</td>
            <td>{{ t[3] }}</td>
            <td>{{ t[4] }}</td>
            <td>{{ t[5] }}</td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
    <p>No transactions yet.</p>
    {% endif %}
    
    <br>
    <a href="{{ url_for('user_dashboard', name=name) }}"><button>Back</button></a>
</body>
</html>
