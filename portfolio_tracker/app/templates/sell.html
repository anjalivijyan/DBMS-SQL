<html>
<head>
    <title>Sell Stock</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Sell Stock</h1>
    <form method="POST">
        <select name="stock_id">
            {% for stock in stocks %}
            <option value="{{ stock[0] }}">{{ stock[1] }} ({{ stock[2] }})</option>
            {% endfor %}
        </select><br><br>
        <input type="number" name="quantity" placeholder="Quantity"><br><br>
        <input type="number" step="0.0001" name="price" placeholder="Price"><br><br>
        <button type="submit">Sell</button>
    </form>
    <br>
    <a href="{{ url_for('user_dashboard', name=name) }}"><button>Back</button></a>
</body>
</html>
